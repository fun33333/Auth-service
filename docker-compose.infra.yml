services:
  # Redis for Real-time chat and Tasks
  redis:
    image: redis:alpine
    container_name: erp_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - erp_network
    restart: unless-stopped
  # Shared PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: erp_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-erp-dbs.sh:/docker-entrypoint-initdb.d/01-init-dbs.sh:ro
      - ./scripts/init-md5-password.sh:/docker-entrypoint-initdb.d/02-set-md5.sh:ro
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network
    restart: unless-stopped

  # PgBouncer Connection Pooler
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: erp_pgbouncer
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
      - PGBOUNCER_POOL_SIZE=25
    volumes:
      - ./config/pgbouncer/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: [ "/entrypoint.sh" ]
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 6432 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - erp_network
    restart: unless-stopped

networks:
  erp_network:
    name: ${ERP_NETWORK}
    driver: bridge

volumes:
  postgres_data:


