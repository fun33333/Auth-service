[databases]
* = host=erp_postgres port=5432 dbname=*

[pgbouncer]
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
listen_addr = 0.0.0.0
listen_port = 6432
pool_mode = transaction
max_client_conn = 100
default_pool_size = 25
logfile = /dev/stdout
pidfile = /var/run/pgbouncer/pgbouncer.pid
ignore_startup_parameters = extra_float_digits



